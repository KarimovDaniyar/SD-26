// ═══════════════════════════════════════════════
//  STATE MACHINES (JS mirrors of Python logic)
// ═══════════════════════════════════════════════

class TokenBucket {
  constructor(capacity=8, rate=1) {
    this.capacity = capacity;
    this.rate = rate;
    this.tokens = capacity;
    this.last = Date.now();
    this.allowed = 0; this.denied = 0;
  }
  allow() {
    const now = Date.now();
    const delta = (now - this.last) / 1000;
    this.tokens = Math.min(this.capacity, this.tokens + delta * this.rate);
    this.last = now;
    if (this.tokens >= 1) { this.tokens -= 1; this.allowed++; return true; }
    this.denied++; return false;
  }
  refill() { this.tokens = Math.min(this.capacity, this.tokens + this.rate * 0.2); this.last = Date.now(); }
}

class LeakyBucket {
  constructor(capacity=6, rate=0.8) {
    this.capacity = capacity;
    this.rate = rate;
    this.queue = [];
    this.last = Date.now();
    this.allowed = 0; this.denied = 0;
  }
  allow() {
    const now = Date.now();
    const leaked = ((now - this.last) / 1000) * this.rate;
    const drain = Math.floor(leaked);
    for (let i = 0; i < drain; i++) if (this.queue.length) this.queue.shift();
    this.last = now;
    if (this.queue.length < this.capacity) { this.queue.push(now); this.allowed++; return true; }
    this.denied++; return false;
  }
  tick() {
    const now = Date.now();
    const leaked = ((now - this.last) / 1000) * this.rate;
    const drain = Math.floor(leaked);
    for (let i = 0; i < drain; i++) if (this.queue.length) this.queue.shift();
    if (drain > 0) this.last = now;
  }
}

class FixedWindowCounter {
  constructor(limit=5, window=8000) {
    this.limit = limit;
    this.window = window;
    this.count = 0;
    this.start = Date.now();
    this.allowed = 0; this.denied = 0;
    this.history = [];
  }
  allow() {
    const now = Date.now();
    if (now - this.start >= this.window) {
      this.history.push({ count: this.count, at: this.start });
      if (this.history.length > 3) this.history.shift();
      this.count = 0; this.start = now;
    }
    if (this.count < this.limit) { this.count++; this.allowed++; return true; }
    this.denied++; return false;
  }
  progress() { return Math.min(1, (Date.now() - this.start) / this.window); }
}

class SlidingWindowLog {
  constructor(limit=5, window=8000) {
    this.limit = limit;
    this.window = window;
    this.log = [];
    this.allowed = 0; this.denied = 0;
  }
  allow() {
    const now = Date.now();
    const cutoff = now - this.window;
    this.log = this.log.filter(t => t >= cutoff);
    if (this.log.length < this.limit) { this.log.push(now); this.allowed++; return true; }
    this.denied++; return false;
  }
  getLog() { return this.log; }
}

class SlidingWindowCounter {
  constructor(limit=5, window=8000) {
    this.limit = limit;
    this.window = window;
    this.prev = 0; this.curr = 0;
    this.winStart = Date.now();
    this.allowed = 0; this.denied = 0;
  }
  allow() {
    const now = Date.now();
    const elapsed = now - this.winStart;
    if (elapsed >= this.window * 2) {
      this.prev = 0; this.curr = 0; this.winStart = now;
    } else if (elapsed >= this.window) {
      this.prev = this.curr; this.curr = 0;
      this.winStart += this.window;
    }
    const e = now - this.winStart;
    const overlap = 1 - e / this.window;
    const estimate = this.prev * overlap + this.curr;
    if (estimate < this.limit) { this.curr++; this.allowed++; return true; }
    this.denied++; return false;
  }
  getOverlap() {
    const elapsed = Math.min(Date.now() - this.winStart, this.window);
    return 1 - elapsed / this.window;
  }
  getPrevFrac() {
    const elapsed = Date.now() - this.winStart;
    return Math.min(1, elapsed / this.window);
  }
}

    state: new LeakyBucket(6, 0.6),
    renderViz: renderLeakyViz,
    code: PY.leaky,
    autoInterval: null,
  },
  {
    id: 'fixed', name: 'Fixed Window Counter',
    badge: 'O(1) memory',
    state: new FixedWindowCounter(5, 10000),
    renderViz: renderFixedViz,
    code: PY.fixed,
    autoInterval: null,
  },
  {
    id: 'slidelog', name: 'Sliding Window Log',
    badge: 'O(n) memory',
    state: new SlidingWindowLog(5, 8000),
    renderViz: renderSlideLogViz,
    code: PY.slidelog,
    autoInterval: null,
  },
  {
    id: 'slidecnt', name: 'Sliding Window Counter',
    badge: 'O(1) memory',
    state: new SlidingWindowCounter(5, 8000),
    renderViz: renderSlideCntViz,
    code: PY.slidecnt,
    autoInterval: null,
  },
];

// ── build DOM ──
const app = document.getElementById('app');
configs.forEach(cfg => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${cfg.id}`;
  card.innerHTML = `
    <div class="card-header">
      <span class="algo-name">${cfg.name}</span>
      <span class="badge">${cfg.badge}</span>
    </div>
    <div class="card-body">
      <div class="viz" id="viz-${cfg.id}"></div>
      <div class="status-bar" id="status-${cfg.id}">
        <span class="status-msg" style="color:var(--muted);font-family:var(--mono);font-size:.72rem">Ready — send a request</span>
      </div>
      <div class="stats" id="stats-${cfg.id}">
        <span class="stat">allowed: <span id="allowed-${cfg.id}">0</span></span>
        <span class="stat">denied: <span id="denied-${cfg.id}">0</span></span>
      </div>
      <div class="code-panel">${cfg.code}</div>
      <div class="controls">
        <button class="primary" onclick="sendReq('${cfg.id}')">Send Request</button>
        <button onclick="burstReq('${cfg.id}')">Burst ×5</button>
        <button onclick="resetAlgo('${cfg.id}')">Reset</button>
        <span class="ctrl-label" id="auto-label-${cfg.id}"></span>
        <button id="auto-btn-${cfg.id}" onclick="toggleAuto('${cfg.id}')">▶ Auto</button>
      </div>
    </div>
  `;
  app.appendChild(card);
  cfg.renderViz(cfg);
});

// ── Animation loop (token refill + leaky drain visuals) ──
setInterval(() => {
  configs.forEach(cfg => {
    if (cfg.id === 'token') { cfg.state.refill(); cfg.renderViz(cfg); }
    if (cfg.id === 'leaky') { cfg.state.tick(); cfg.renderViz(cfg); }
    if (cfg.id === 'fixed') cfg.renderViz(cfg);
    if (cfg.id === 'slidelog') cfg.renderViz(cfg);
    if (cfg.id === 'slidecnt') cfg.renderViz(cfg);
  });
}, 300);

// ═══════════════════════════════════════════════
//  VIZ RENDERERS
// ═══════════════════════════════════════════════

function renderTokenViz(cfg) {
  const s = cfg.state;
  const el = document.getElementById(`viz-${cfg.id}`);
  const filled = Math.floor(s.tokens);
  let html = `
    <div class="viz-row">
      <span class="viz-label">tokens</span>
      <div class="tokens-track">`;
  for (let i = 0; i < s.capacity; i++) {
    html += `<div class="token${i < filled ? '' : ' consumed'}"></div>`;
  }
  html += `</div><span style="font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-left:.4rem">${s.tokens.toFixed(1)}/${s.capacity}</span></div>`;
  html += `<div class="viz-row"><span class="viz-label">rate</span>
    <span style="font-family:var(--mono);font-size:.75rem;color:var(--green)">+${s.rate} token/sec</span></div>`;
  el.innerHTML = html;
}

function renderLeakyViz(cfg) {
  const s = cfg.state;
  const el = document.getElementById(`viz-${cfg.id}`);
  const qLen = s.queue.length;
  let html = `
    <div class="viz-row">
      <span class="viz-label">queue</span>
      <div class="queue-vis">`;
  for (let i = 0; i < qLen; i++) html += `<div class="queue-item"></div>`;
  html += `</div>
      <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-left:.4rem">${qLen}/${s.capacity}</span>
    </div>
    <div class="viz-row">
      <span class="viz-label">drain</span>
      <span style="font-family:var(--mono);font-size:.75rem;color:var(--blue)">${s.rate} req/sec ↓</span>
    </div>
    <div class="viz-row">
      <span class="viz-label">usage</span>
      <div class="bar-track">
        <div class="bar-fill${qLen/s.capacity > .8?' danger':qLen/s.capacity>.5?' warn':''}" style="width:${(qLen/s.capacity)*100}%"></div>
      </div>
    </div>`;
  el.innerHTML = html;
}

function renderFixedViz(cfg) {
  const s = cfg.state;
  const el = document.getElementById(`viz-${cfg.id}`);
  const prog = s.progress();
  const pct = (s.count / s.limit) * 100;
  let html = `
    <div class="viz-row">
      <span class="viz-label">count</span>
      <div class="bar-track">
        <div class="bar-fill${pct>=100?' danger':pct>=80?' warn':''}" style="width:${pct}%"></div>
      </div>
      <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-left:.4rem">${s.count}/${s.limit}</span>
    </div>
    <div class="viz-row">
      <span class="viz-label">window</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${prog*100}%;background:var(--amber);opacity:.6"></div>
      </div>
      <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-left:.4rem">${((1-prog)*(s.window/1000)).toFixed(1)}s left</span>
    </div>
    <div class="viz-row">
      <span class="viz-label">windows</span>
      <div class="window-vis">`;

  const hist = s.history.slice(-2);
  hist.forEach(h => {
    const p = (h.count / s.limit) * 100;
    html += `<div class="win-box">
      <span class="win-count" style="color:var(--muted)">${h.count}</span>
      <span class="win-label">prev</span>
    </div>`;
  });
  html += `<div class="win-separator${hist.length ? ' show' : ''}"></div>`;
  html += `<div class="win-box active">
    <span class="win-count">${s.count}</span>
    <span class="win-label">current</span>
  </div></div></div>`;
  el.innerHTML = html;
}

function renderSlideLogViz(cfg) {
  const s = cfg.state;
  const el = document.getElementById(`viz-${cfg.id}`);
  const now = Date.now();
  const log = s.getLog();
  const winMs = s.window;

  let html = `<div class="viz-row">
    <span class="viz-label">log</span>
    <div class="timeline" id="tl-${cfg.id}">`;

  log.forEach(t => {
    const age = now - t;
    const pos = 100 - (age / winMs) * 100;
    if (pos >= 0) {
      html += `<div class="tick allowed" style="left:${pos}%"></div>`;
    }
  });

  html += `</div>
    <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-left:.4rem">${log.length}/${s.limit}</span>
  </div>
  <div class="viz-row">
    <span class="viz-label">window</span>
    <span style="font-family:var(--mono);font-size:.75rem;color:var(--blue)">sliding ${s.window/1000}s</span>
  </div>
  <div class="viz-row">
    <span class="viz-label">usage</span>
    <div class="bar-track">
      <div class="bar-fill${log.length>=s.limit?' danger':log.length/s.limit>.7?' warn':''}" style="width:${(log.length/s.limit)*100}%"></div>
    </div>
  </div>`;
  el.innerHTML = html;
}

function renderSlideCntViz(cfg) {
  const s = cfg.state;
  const el = document.getElementById(`viz-${cfg.id}`);
  const overlap = s.getOverlap();
  const prevFrac = s.getPrevFrac();
  const estimate = Math.round((s.prev * overlap + s.curr) * 10) / 10;

  let html = `<div class="viz-row">
    <span class="viz-label">blend</span>
    <div class="blend-vis">
      <div class="blend-prev" style="width:50%"></div>
      <div class="blend-cur" style="width:50%"></div>
      <div class="blend-window" style="left:${(1-overlap)*50}%;width:${50+overlap*50}%"></div>
      <span class="blend-label" style="left:12%;color:rgba(108,99,255,.7)">prev·${(overlap*100).toFixed(0)}%</span>
      <span class="blend-label" style="right:8%;color:rgba(45,212,160,.7)">curr</span>
    </div>
  </div>
  <div class="viz-row">
    <span class="viz-label">prev</span>
    <span style="font-family:var(--mono);font-size:.75rem;color:var(--accent)">${s.prev} × ${(overlap).toFixed(2)} = ${(s.prev*overlap).toFixed(1)}</span>
  </div>
  <div class="viz-row">
    <span class="viz-label">estimate</span>
    <div class="bar-track">
      <div class="bar-fill${estimate>=s.limit?' danger':estimate/s.limit>.7?' warn':''}" style="width:${Math.min(100,(estimate/s.limit)*100)}%"></div>
    </div>
    <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-left:.4rem">${estimate}/${s.limit}</span>
  </div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════

function sendReq(id) {
  const cfg = configs.find(c => c.id === id);
  const result = cfg.state.allow();
  cfg.renderViz(cfg);
  showStatus(id, result, cfg.state);
  updateStats(id, cfg.state);
}

function burstReq(id) {
  let i = 0;
  const iv = setInterval(() => {
    sendReq(id);
    if (++i >= 5) clearInterval(iv);
  }, 120);
}

function resetAlgo(id) {
  const cfg = configs.find(c => c.id === id);
  const C = cfg.state.constructor;
  const old = cfg.state;
  if (id==='token')    cfg.state = new TokenBucket(old.capacity, old.rate);
  if (id==='leaky')    cfg.state = new LeakyBucket(old.capacity, old.rate);
  if (id==='fixed')    cfg.state = new FixedWindowCounter(old.limit, old.window);
  if (id==='slidelog') cfg.state = new SlidingWindowLog(old.limit, old.window);
  if (id==='slidecnt') cfg.state = new SlidingWindowCounter(old.limit, old.window);
  cfg.renderViz(cfg);
  document.getElementById(`status-${id}`).innerHTML =
    `<span class="status-msg" style="color:var(--muted);font-family:var(--mono);font-size:.72rem">Reset — ready</span>`;
  updateStats(id, cfg.state);
}

const autoIntervals = {};
function toggleAuto(id) {
  const btn = document.getElementById(`auto-btn-${id}`);
  const lbl = document.getElementById(`auto-label-${id}`);
  if (autoIntervals[id]) {
    clearInterval(autoIntervals[id]);
    autoIntervals[id] = null;
    btn.textContent = '▶ Auto';
    lbl.textContent = '';
  } else {
    btn.textContent = '⏹ Stop';
    lbl.textContent = 'sending every 600ms';
    autoIntervals[id] = setInterval(() => sendReq(id), 600);
  }
}

function showStatus(id, allowed, state) {
  const el = document.getElementById(`status-${id}`);
  const pill = allowed
    ? `<span class="status-pill allowed">✓ Allowed</span>`
    : `<span class="status-pill denied">✗ Denied</span>`;
  let msg = '';
  if (id === 'token')    msg = allowed ? `${state.tokens.toFixed(1)} tokens remaining` : 'Bucket empty — wait for refill';
  if (id === 'leaky')    msg = allowed ? `Queued (${state.queue.length}/${state.capacity})` : 'Queue full — request dropped';
  if (id === 'fixed')    msg = allowed ? `${state.count}/${state.limit} in window` : 'Window limit reached';
  if (id === 'slidelog') msg = allowed ? `${state.log.length}/${state.limit} in sliding window` : 'Sliding window full';
  if (id === 'slidecnt') {
    const ov = state.getOverlap();
    const est = (state.prev * ov + state.curr).toFixed(1);
    msg = allowed ? `Estimate: ${est}/${state.limit}` : `Estimate ${est} ≥ ${state.limit} — denied`;
  }
  el.innerHTML = `${pill}<span class="status-msg">${msg}</span>`;
}

function updateStats(id, state) {
  document.getElementById(`allowed-${id}`).textContent = state.allowed;
  document.getElementById(`denied-${id}`).textContent = state.denied;
}
</script>
</body>
</html>
